version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_container
    restart: unless-stopped
    environment:
      POSTGRES_USER: flask_user
      POSTGRES_PASSWORD: flask_password
      POSTGRES_DB: multischema
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flask_user -d multischema"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - sites_data:/app/sites
      - instance_data:/tmp/flask_instance
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      DATABASE_URL: "postgresql+psycopg2://flask_user:flask_password@postgres/multischema"
      SECRET_KEY: "dev-secret-key-change-in-production"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    command: >
      sh -c "sleep 15 &&
      if [ ! -d 'migrations' ]; then flask db init; fi &&
      flask db migrate -m 'Initial migration' &&
      flask db upgrade &&
      flask run --host=0.0.0.0 --port=5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/user/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  sites_data:
  instance_data:
