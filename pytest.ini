[pytest]
# Configuração do pytest para o MultiSchema

# Diretórios de testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Opções padrão
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Marcadores personalizados
markers =
    unit: Testes unitários (services, repositories, utils)
    integration: Testes de integração (API, database)
    slow: Testes que demoram mais tempo

# Aumentar o path do Python para imports
pythonpath = .
